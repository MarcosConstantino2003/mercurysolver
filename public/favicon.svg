<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="mercuryGrad" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#E2E8F0" />
            <stop offset="50%" stop-color="#94A3B8" />
            <stop offset="100%" stop-color="#475569" />
        </radialGradient>

        <linearGradient id="orbitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" stop-opacity="0" />
            <stop offset="40%" stop-color="#38BDF8" stop-opacity="1" />
            <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1" />
        </linearGradient>

        <linearGradient id="orbitGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C084FC" stop-opacity="0" />
            <stop offset="60%" stop-color="#C084FC" stop-opacity="1" />
            <stop offset="100%" stop-color="#C084FC" stop-opacity="0.1" />
        </linearGradient>

        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.2"/>
        </filter>

        <style>
            @keyframes orbit-spin-1 {
                0% { transform: rotate(-35deg) scale(1); }
                50% { transform: rotate(-35deg) scale(1.05); }
                100% { transform: rotate(-35deg) scale(1); }
            }
            @keyframes orbit-spin-2 {
                0% { transform: rotate(35deg) scale(1); }
                50% { transform: rotate(35deg) scale(1.02); }
                100% { transform: rotate(35deg) scale(1); }
            }
            .orbit-1 { animation: orbit-spin-1 6s ease-in-out infinite; transform-origin: 100px 100px; }
            .orbit-2 { animation: orbit-spin-2 8s ease-in-out infinite; transform-origin: 100px 100px; }
            .glow-effect { filter: drop-shadow(0px 0px 15px rgba(56, 189, 248, 0.5)); }
        </style>
    </defs>

    <g transform="translate(20, 20)">
        <ellipse class="orbit-1" cx="80" cy="80" rx="95" ry="30" fill="none" stroke="url(#orbitGrad1)" stroke-width="6" stroke-linecap="round" />
        <ellipse class="orbit-2" cx="80" cy="80" rx="95" ry="30" fill="none" stroke="url(#orbitGrad2)" stroke-width="6" stroke-linecap="round" />

        <circle class="glow-effect" filter="url(#dropShadow)" cx="80" cy="80" r="60" fill="url(#mercuryGrad)" />

        <g fill="#64748B" opacity="0.4">
            <ellipse cx="55" cy="50" rx="14" ry="10" transform="rotate(-20 55 50)" />
            <ellipse cx="115" cy="70" rx="8" ry="12" transform="rotate(15 115 70)" />
            <ellipse cx="85" cy="120" rx="18" ry="8" transform="rotate(10 85 120)" />
            <circle cx="45" cy="95" r="6" />
        </g>
        <g fill="#334155" opacity="0.5">
            <ellipse cx="57" cy="52" rx="12" ry="8" transform="rotate(-20 57 52)" />
            <ellipse cx="113" cy="70" rx="6" ry="10" transform="rotate(15 113 70)" />
            <ellipse cx="87" cy="118" rx="16" ry="6" transform="rotate(10 87 118)" />
            <circle cx="46" cy="96" r="4" />
        </g>

        <path d="M 50,105 L 50,65 L 80,90 L 110,65 L 110,105" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#dropShadow)" />
    </g>
</svg>
